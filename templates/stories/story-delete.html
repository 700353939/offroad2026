{% extends "common/base.html" %}

{% block content %}

    <h1>Delete Story</h1>

    <p>Are you sure you want to delete this story?</p>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn delete">Delete</button>

        <a href="{% url 'story-details' story.pk %}" class="btn">Cancel</a>

    </form>

{% endblock %}
